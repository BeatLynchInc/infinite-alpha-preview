<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pillar III — Market Structure & Return Mechanics</title>
<style>
:root{--gold:#C9A84C;--dark:#0D0F14;--panel:#13161E;--border:#1E2330;--text:#E8EAF0;--muted:#7A8099;--accent:#3B82F6;--green:#22C55E;--red:#EF4444;--purple:#a855f7;--orange:#f59e0b;--cyan:#06b6d4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Georgia',serif;font-size:16px;line-height:1.75;}
.top-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.logo{font-family:Arial,sans-serif;font-weight:900;font-size:18px;color:var(--gold);letter-spacing:2px;}
.pill{background:var(--gold);color:var(--dark);font-family:Arial,sans-serif;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;}
.pill-tier{background:var(--accent);color:#fff;}
.pill-pillar{background:var(--purple);color:#fff;}
.tab-nav{display:flex;gap:4px;margin-left:auto;}
.tab-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:Arial,sans-serif;font-size:12px;font-weight:700;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.tab-btn.active{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.tab-btn:hover:not(.active){border-color:var(--gold);color:var(--gold);}
.hero{background:linear-gradient(135deg,#0D0F14,#13161E,#0a0c10);border-bottom:1px solid var(--border);padding:56px 32px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 70%);pointer-events:none;}
.course-label{font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.hero h1{font-size:clamp(26px,4vw,44px);font-weight:400;color:#fff;margin-bottom:12px;line-height:1.2;}
.hero-sub{font-size:17px;color:var(--muted);max-width:720px;margin:0 auto 28px;}
.meta-row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;}
.meta-item{text-align:center;}
.meta-num{font-family:Arial,sans-serif;font-size:26px;font-weight:700;color:var(--gold);}
.meta-label{font-family:Arial,sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.container{max-width:960px;margin:0 auto;padding:40px 24px;}
.section{margin-bottom:52px;}
.section-title{font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
h2{font-size:22px;color:#fff;font-weight:400;margin-bottom:10px;}
h3{font-family:Arial,sans-serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:22px;}
p{color:#BEC3D4;margin-bottom:14px;}
strong.hl{color:#fff;}
.tab-content{display:none;}.tab-content.active{display:block;}
.principle-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0 32px;}
@media(max-width:640px){.principle-grid{grid-template-columns:1fr;}}
.principle-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;border-top:3px solid var(--gold);}
.principle-num{font-family:Arial,sans-serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.principle-title{font-size:16px;color:#fff;margin-bottom:6px;}
.principle-desc{font-family:Arial,sans-serif;font-size:13px;color:var(--muted);line-height:1.5;}
.lesson-grid{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.lesson-card{background:var(--panel);border-bottom:1px solid var(--border);padding:18px 22px;display:grid;grid-template-columns:46px 1fr auto;gap:14px;align-items:start;cursor:pointer;transition:background .2s;}
.lesson-card:last-child{border-bottom:none;}
.lesson-card:hover,.lesson-card.active-card{background:#1a1e2a;}
.lesson-card.active-card{border-left:3px solid var(--gold);}
.lesson-num{font-family:Arial,sans-serif;font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.lesson-title{font-size:16px;color:#fff;margin-bottom:3px;}
.lesson-desc{font-family:Arial,sans-serif;font-size:12px;color:var(--muted);line-height:1.5;}
.lesson-mp{font-family:Arial,sans-serif;font-size:12px;font-weight:700;color:var(--gold);background:rgba(201,168,76,.1);padding:3px 10px;border-radius:20px;white-space:nowrap;align-self:center;}
.lesson-detail{background:#0e1018;border-top:1px solid var(--border);padding:28px;display:none;}
.lesson-detail.open{display:block;}
.fw-table{width:100%;border-collapse:collapse;margin:12px 0 20px;}
.fw-table th{background:rgba(201,168,76,.08);font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);}
.fw-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-family:Arial,sans-serif;font-size:13px;color:#BEC3D4;vertical-align:top;}
.fw-table tr:last-child td{border-bottom:none;}
.fw-table tr:hover td{background:rgba(255,255,255,.02);}
.callout{background:rgba(201,168,76,.05);border-left:3px solid var(--gold);padding:16px 20px;border-radius:0 8px 8px 0;margin:18px 0;}
.callout-label{font-family:Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
.callout p{color:var(--text);margin:0;font-size:14px;}
.callout p+p{margin-top:8px;}
.callout-blue{border-left-color:var(--accent);background:rgba(59,130,246,.05);}.callout-blue .callout-label{color:var(--accent);}
.callout-red{border-left-color:var(--red);background:rgba(239,68,68,.05);}.callout-red .callout-label{color:var(--red);}
.callout-green{border-left-color:var(--green);background:rgba(34,197,94,.05);}.callout-green .callout-label{color:var(--green);}
.callout-purple{border-left-color:var(--purple);background:rgba(168,85,247,.05);}.callout-purple .callout-label{color:var(--purple);}
.callout-cyan{border-left-color:var(--cyan);background:rgba(6,182,212,.05);}.callout-cyan .callout-label{color:var(--cyan);}
.callout-orange{border-left-color:var(--orange);background:rgba(245,158,11,.05);}.callout-orange .callout-label{color:var(--orange);}
.exhibit{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:22px;margin:18px 0;}
.exhibit-label{font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:16px 0;}
@media(max-width:640px){.two-col,.three-col{grid-template-columns:1fr;}}
.stat-card{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:18px;text-align:center;}
.stat-num{font-family:Arial,sans-serif;font-size:28px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px;}
.stat-label{font-family:Arial,sans-serif;font-size:11px;color:var(--muted);line-height:1.4;}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px;}
.ctag{font-family:Arial,sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.5px;background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.divider{border:none;border-top:1px solid var(--border);margin:36px 0;}
.formula-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:20px 24px;text-align:center;margin:16px 0;font-family:Arial,sans-serif;}
.formula-main{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:1px;margin-bottom:6px;}
.formula-sub{font-size:12px;color:var(--muted);letter-spacing:.5px;}
.bar-chart-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
.bar-chart-label{font-family:Arial,sans-serif;font-size:12px;color:var(--muted);width:140px;text-align:right;flex-shrink:0;}
.bar-chart-track{flex:1;background:rgba(255,255,255,.04);border-radius:4px;height:22px;position:relative;overflow:hidden;}
.bar-chart-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:Arial,sans-serif;font-size:11px;font-weight:700;color:#fff;min-width:30px;}
.sensitivity-grid{display:grid;grid-template-columns:auto repeat(5,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin:12px 0;}
.sensitivity-grid div{background:var(--panel);padding:8px 6px;font-family:Arial,sans-serif;font-size:11px;text-align:center;color:#BEC3D4;}
.sensitivity-grid .sg-header{background:rgba(201,168,76,.08);color:var(--gold);font-weight:700;font-size:10px;letter-spacing:.5px;}
.sensitivity-grid .sg-row-header{background:rgba(59,130,246,.06);color:var(--accent);font-weight:700;text-align:right;padding-right:10px;}
.sensitivity-grid .sg-highlight{background:rgba(34,197,94,.08);color:var(--green);font-weight:700;}
.sensitivity-grid .sg-danger{background:rgba(239,68,68,.06);color:var(--red);}
.svg-wrap{display:flex;justify-content:center;margin:18px 0;}
.svg-wrap svg{max-width:100%;height:auto;}
.exam-wrap{max-width:800px;margin:0 auto;}
.start-exam-wrap{text-align:center;padding:40px 20px;}
.start-exam-wrap h2{color:#fff;margin-bottom:12px;}
.start-exam-wrap p{color:var(--muted);max-width:500px;margin:0 auto 24px;}
.exam-rules{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin:24px 0;text-align:left;}
.rule-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;}
.rule-card .r-num{font-family:Arial,sans-serif;font-size:22px;font-weight:900;color:var(--gold);}
.rule-card .r-label{font-family:Arial,sans-serif;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.score-bar-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px 28px;margin-bottom:28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.score-big{font-size:42px;font-weight:900;color:var(--gold);line-height:1;}
.score-sub{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.progress-track{flex:1;min-width:200px;background:rgba(255,255,255,.06);border-radius:8px;height:12px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(201,168,76,.5),var(--gold));border-radius:8px;transition:width .5s ease;}
.q-block{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px;transition:border-color .3s;}
.q-block.answered-correct{border-color:var(--green);}
.q-block.answered-wrong{border-color:var(--red);}
.q-num{font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:15px;color:#fff;margin-bottom:16px;line-height:1.6;}
.q-options{display:flex;flex-direction:column;gap:8px;}
.q-opt{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:11px 15px;font-family:Arial,sans-serif;font-size:14px;color:#BEC3D4;cursor:pointer;transition:all .2s;text-align:left;display:flex;gap:12px;align-items:flex-start;}
.q-opt:hover:not(:disabled){background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.4);color:#fff;}
.q-opt:disabled{cursor:default;}
.q-opt.correct{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green);}
.q-opt.wrong{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red);}
.q-opt.reveal-correct{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.4);color:var(--green);}
.opt-letter{font-weight:700;flex-shrink:0;width:18px;}
.q-feedback{margin-top:10px;padding:11px 15px;border-radius:8px;font-family:Arial,sans-serif;font-size:13px;line-height:1.5;display:none;}
.q-feedback.correct{background:rgba(34,197,94,.08);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.q-feedback.wrong{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.exam-result{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(59,130,246,.04));border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:40px;text-align:center;margin-top:32px;display:none;}
.result-score{font-family:Arial,sans-serif;font-size:64px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:8px;}
.exam-btn{background:var(--gold);color:var(--dark);font-family:Arial,sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;padding:12px 28px;border-radius:8px;border:none;cursor:pointer;margin:4px;}
.exam-btn:hover{opacity:.9;}
.result-pass{color:var(--green);}.result-fail{color:var(--red);}
.result-msg{color:var(--muted);max-width:520px;margin:0 auto 24px;font-size:15px;}
.anti-game-notice{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:14px 18px;margin:18px 0;font-family:Arial,sans-serif;font-size:12px;color:var(--red);line-height:1.5;text-align:center;}
</style>
</head>

<h1>Market Structure & Return Mechanics</h1>
<p class="hero-sub">How
